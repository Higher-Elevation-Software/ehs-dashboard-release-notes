name: Rebuild changelog aggregates (main)

on:
  push:
    branches: [main]
    paths-ignore:
      - data/releases.json
      - index.md

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    concurrency:
      group: rebuild-aggregates-main
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Rebuild data/releases.json and index.md
        run: |
          set -euo pipefail
          python3 scripts/validate_release_notes.py
          python3 scripts/build_releases_json.py
          python3 scripts/build_index_md.py

      - name: Commit and push aggregates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/releases.json index.md
          git diff --cached --quiet && echo "No aggregate changes" && exit 0

          git commit -m "Rebuild changelog aggregates [skip ci]"

          # Rebase to avoid push races if multiple PRs merge close together.
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 2
          done
          echo "Failed to push aggregates after retries" >&2
          exit 1
